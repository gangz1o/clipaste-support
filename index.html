<!DOCTYPE html>
<html lang="zh">
<head>

  <title>Clipaste – Legal</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:    #3b82f6;
      --accent-dk: #2563eb;
      --bg:        #f8fafc;
      --surface:   #ffffff;
      --border:    #e2e8f0;
      --text:      #1e293b;
      --muted:     #64748b;
      --radius:    12px;
      --shadow:    0 1px 3px 0 rgb(0 0 0 / .08), 0 1px 2px -1px rgb(0 0 0 / .08);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
                   Roboto, "Helvetica Neue", Arial, "Noto Sans CJK SC",
                   "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text);
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    /* ── Language switcher ───────────────────────────────────── */
    .lang-switcher {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }

    .lang-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      transition: background .15s, color .15s;
      line-height: 1.4;
    }

    .lang-btn:hover { background: var(--border); color: var(--text); }

    .lang-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* ── Page nav ────────────────────────────────────────────── */
    .page-nav {
      max-width: 860px;
      margin: 1.5rem auto 0;
      padding: 0 1.5rem;
      display: flex;
      gap: 4px;
      border-bottom: 2px solid var(--border);
    }

    .page-tab {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.6rem 1.1rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      position: relative;
      bottom: -2px;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }

    .page-tab:hover { color: var(--text); }

    .page-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Main content ────────────────────────────────────────── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .doc-header {
      margin-bottom: 2rem;
    }

    .doc-title {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1.25;
    }

    .doc-updated {
      margin-top: 0.4rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .doc-intro {
      margin-top: 1rem;
      padding: 1.25rem 1.5rem;
      background: #eff6ff;
      border-left: 4px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      font-size: 0.95rem;
      color: #1e40af;
      line-height: 1.7;
    }

    /* ── Sections ────────────────────────────────────────────── */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      background: var(--accent);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .section-body {
      font-size: 0.93rem;
      color: #334155;
      line-height: 1.8;
    }

    .section-body p { margin-bottom: 0.7rem; }
    .section-body p:last-child { margin-bottom: 0; }

    .section-body ul {
      padding-left: 1.25rem;
      margin: 0.5rem 0 0.7rem;
    }

    .section-body li { margin-bottom: 0.5rem; }

    .section-body strong { color: var(--text); font-weight: 600; }

    .highlight-block {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 0.9rem 1.1rem;
      margin-top: 0.75rem;
      font-size: 0.88rem;
      color: #166534;
    }

    /* ── Contact card ────────────────────────────────────────── */
    .contact-card {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.88rem;
      color: var(--accent-dk);
      text-decoration: none;
      transition: background .15s;
      margin-top: 0.5rem;
    }

    .contact-card:hover { background: #dbeafe; }

    /* ── Footer ──────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      background: var(--surface);
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 600px) {
      .header-inner { padding: 0 1rem; }
      .page-nav, main { padding-left: 1rem; padding-right: 1rem; }
      .doc-title { font-size: 1.4rem; }
      .lang-btn { padding: 4px 8px; }
      .section { padding: 1.1rem 1.2rem; }
    }
  </style>
</head>

/* ─── UI Labels (nav tabs, footer) ──────────────────────────── */
const UI = {
  zh: {
    privacy: "隐私政策",
    terms:   "服务条款",
    footer:  "© 2026 Clipaste. 保留所有权利。"
  },
  en: {
    privacy: "Privacy Policy",
    terms:   "Terms of Service",
    footer:  "© 2026 Clipaste. All rights reserved."
  },
  ja: {
    privacy: "プライバシーポリシー",
    terms:   "利用規約",
    footer:  "© 2026 Clipaste. All rights reserved."
  }
};

/* ─── State ──────────────────────────────────────────────────── */
let currentLang = localStorage.getItem('clipaste-lang') || 'zh';
let currentPage = new URLSearchParams(location.search).get('page') || 'privacy';

/* ─── Render ─────────────────────────────────────────────────── */
function render() {
  const doc  = DOCS[currentPage][currentLang];
  const ui   = UI[currentLang];

  /* html lang attr */
  document.documentElement.lang = currentLang;

  /* document title */
  document.title = doc.title + " – Clipaste";

  /* language buttons */
  ['zh','en','ja'].forEach(l => {
    document.getElementById('btn-' + l)
      .classList.toggle('active', l === currentLang);
  });

  /* page tabs */
  ['privacy','terms'].forEach(p => {
    const tab = document.getElementById('tab-' + p);
    tab.textContent  = ui[p];
    tab.classList.toggle('active', p === currentPage);
    tab.setAttribute('aria-selected', p === currentPage ? 'true' : 'false');
  });

  /* footer */
  document.getElementById('footer-text').textContent = ui.footer;

  /* body */
  const sections = doc.sections.map((s, i) => `
    <div class="section">
      <div class="section-title">
        <span class="section-num">${i + 1}</span>
        ${s.title}
      </div>
      <div class="section-body">${s.body}</div>
    </div>`).join('');

  document.getElementById('doc-content').innerHTML = `
    <div class="doc-header">
      <h1 class="doc-title">${doc.title}</h1>
      <p class="doc-updated">${doc.updated}</p>
      <div class="doc-intro">${doc.intro}</div>
    </div>
    ${sections}`;

  /* scroll to top when switching pages */
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ─── Public setters ─────────────────────────────────────────── */
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('clipaste-lang', lang);
  render();
}

function setPage(page) {
  currentPage = page;
  const url = new URL(location);
  url.searchParams.set('page', page);
  history.pushState({}, '', url);
  render();
}

/* ─── Handle browser back/forward ───────────────────────────── */
window.addEventListener('popstate', () => {
  currentPage = new URLSearchParams(location.search).get('page') || 'privacy';
  render();
});

/* ─── Boot ───────────────────────────────────────────────────── */
render();
</script>
